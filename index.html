function sv(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function lv(k,d){try{const s=localStorage.getItem(k);return s?JSON.parse(s):d;}catch(e){return d;}}

function useLs(key,def){
  const [val,setVal]=useState(()=>lv(key,def));
  const set=v=>{setVal(v);sv(key,v);};
  return [val,set];
}

function getDaysLeft(d){
  const t=new Date();t.setHours(0,0,0,0);
  const x=new Date(d+"T00:00:00");x.setHours(0,0,0,0);
  return Math.round((x-t)/86400000);
}

function DeadlineBadge({deadline,time,endTime}){
  if(!deadline)return null;
  const days=getDaysLeft(deadline);
  let bg,color,label;
  if(days<0)      {bg="#fce4ec";color="#c62828";label=`${Math.abs(days)}d te laat`;}
  else if(days===0){bg="#fff3e0";color="#e65100";label="Vandaag!";}
  else if(days===1){bg="#fff8e1";color="#f57f17";label="Morgen";}
  else             {bg="#e8f5e9";color="#2e7d32";label=`${days}d over`;}
  const ts=time&&endTime?`${time}–${endTime}`:time||"";
  return <span style={{background:bg,color,borderRadius:20,padding:"2px 9px",fontSize:10,fontWeight:600,whiteSpace:"nowrap"}}>{label}{ts?` · ${ts}`:""}</span>;
}

function confetti(x,y){
  ["#ff7a2f","#c9a96e","#66bb6a","#4a90d9","#e05080","#ffca28"].forEach((c,i)=>{
    setTimeout(()=>{
      const el=document.createElement("div");
      el.className="conf";
      el.style.cssText=`left:${x+Math.random()*80-40}px;top:${y-10}px;background:${c};animation-duration:${0.6+Math.random()*0.4}s;`;
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),1000);
    },i*30);
  });
}

/* ─── Storage size helper ─── */
function getStorageUsed(){
  let total=0;
  try{
    for(let i=0;i<localStorage.length;i++){
      const k=localStorage.key(i);
      total+=(localStorage.getItem(k)||"").length*2;
    }
  }catch(e){}
  return total;
}

/* ─── Rename input component (avoids DOM getElementById hacks) ─── */
function VRenameInput({currentName,onSave,onCancel,inp,th,darkAccent}){
  const [val,setVal]=React.useState(currentName);
  return(
    <>
      <input value={val} onChange={e=>setVal(e.target.value)} autoFocus onKeyDown={e=>{if(e.key==="Enter"&&val.trim()){onSave(val.trim());onCancel();}if(e.key==="Escape")onCancel();}} style={{...inp,flex:1,padding:"5px 10px",fontSize:13}}/>
      <button onClick={()=>{if(val.trim()){onSave(val.trim());onCancel();}}} style={{padding:"5px 11px",background:th.accent,border:"none",borderRadius:7,color:darkAccent,fontFamily:"inherit",fontSize:12,flexShrink:0}}>OK</button>
      <button onClick={onCancel} style={{padding:"5px 9px",background:th.badge,border:`1px solid ${th.border}`,borderRadius:7,color:th.sub,fontFamily:"inherit",fontSize:12,flexShrink:0}}>✕</button>
    </>
  );
}

/* ─── Inline name input for new file/folder ─── */
function VNewInput({label,placeholder,onConfirm,onCancel,inp,th,darkAccent}){
  const [val,setVal]=React.useState("");
  return(
    <div style={{display:"flex",gap:7,marginTop:8,alignItems:"center"}}>
      <input value={val} onChange={e=>setVal(e.target.value)} autoFocus placeholder={placeholder} onKeyDown={e=>{if(e.key==="Enter"&&val.trim())onConfirm(val.trim());if(e.key==="Escape")onCancel();}} style={{...inp,flex:1,padding:"8px 12px",fontSize:13}}/>
      <button onClick={()=>{if(val.trim())onConfirm(val.trim());}} style={{padding:"8px 14px",background:th.accent,border:"none",borderRadius:8,color:darkAccent,fontFamily:"inherit",fontSize:13,fontWeight:600,flexShrink:0}}>OK</button>
      <button onClick={onCancel} style={{padding:"8px 10px",background:th.badge,border:`1px solid ${th.border}`,borderRadius:8,color:th.sub,fontFamily:"inherit",fontSize:13,flexShrink:0}}>✕</button>
    </div>
  );
}

/* ─── Folder view component with drag & drop ─── */
function VFolderView({files,folders,vFolder,setVFolder,setVFile,setRenaming,renaming,setFiles,setFolders,newFile,newFolder,deleteFolder,th,inp,darkAccent,breadcrumb,currentFolderFiles,currentSubFolders,vNewName,setVNewName,vNewMode,setVNewMode,vDragOver,setVDragOver,updateFile,addPhoto}){
  const [dragId,setDragId]=React.useState(null);
  const [dragType,setDragType]=React.useState(null); // "file"|"folder"
  const photoRef=React.useRef();

  const bc=breadcrumb();
  const subFolders=currentSubFolders();
  const folderFiles=currentFolderFiles();

  function onDragStart(e,id,type){
    setDragId(id);setDragType(type);
    e.dataTransfer.effectAllowed="move";
    e.dataTransfer.setData("text/plain",id);
  }
  function onDragOver(e,targetFolderId){
    e.preventDefault();e.dataTransfer.dropEffect="move";
    setVDragOver(targetFolderId);
  }
  function onDrop(e,targetFolderId){
    e.preventDefault();setVDragOver(null);
    if(!dragId)return;
    if(dragType==="file"){
      setFiles(files.map(f=>f.id===dragId?{...f,folderId:targetFolderId}:f));
    } else if(dragType==="folder"){
      if(dragId===targetFolderId)return;
      setFolders(folders.map(fo=>fo.id===dragId?{...fo,parentId:targetFolderId}:fo));
    }
    setDragId(null);setDragType(null);
  }
  function onDragEnd(){setDragId(null);setDragType(null);setVDragOver(null);}

  const dropZoneStyle=(fid)=>({
    outline:vDragOver===fid?`2px dashed ${th.accent}`:"none",
    background:vDragOver===fid?th.accent+"14":"transparent",
    borderRadius:9,
    transition:"all .12s",
  });

  function handleTplClick(tpl){
    setVNewMode("tpl:"+FILE_TPLS.indexOf(tpl));
    setVNewName(tpl.name);
  }

  return(
    <div>
      {/* Breadcrumb / drop zone for root */}
      <div
        style={{display:"flex",alignItems:"center",gap:5,marginBottom:12,flexWrap:"wrap",padding:"4px 6px",borderRadius:8,...dropZoneStyle(null)}}
        onDragOver={e=>onDragOver(e,null)} onDrop={e=>onDrop(e,null)} onDragLeave={()=>setVDragOver(null)}>
        <button onClick={()=>setVFolder(null)} style={{background:"none",border:"none",color:vFolder===null?th.accent:th.sub,fontSize:13,fontFamily:"inherit",fontWeight:vFolder===null?700:400,padding:0}}>📁 Root</button>
        {bc.map((fo,i)=>(
          <React.Fragment key={fo.id}>
            <span style={{color:th.muted,fontSize:12}}>›</span>
            <button onClick={()=>setVFolder(fo.id)} style={{background:"none",border:"none",color:i===bc.length-1?th.accent:th.sub,fontSize:13,fontFamily:"inherit",fontWeight:i===bc.length-1?700:400,padding:0}}>{fo.name}</button>
          </React.Fragment>
        ))}
        {vDragOver===null&&dragId&&<span style={{color:th.accent,fontSize:11,marginLeft:6}}>⬆ Laat hier los voor Root</span>}
      </div>

      {/* Sub-folders */}
      {subFolders.map(fo=>(
        <div key={fo.id}
          draggable onDragStart={e=>onDragStart(e,fo.id,"folder")} onDragEnd={onDragEnd}
          onDragOver={e=>onDragOver(e,fo.id)} onDrop={e=>onDrop(e,fo.id)} onDragLeave={()=>setVDragOver(null)}
          onClick={()=>setVFolder(fo.id)}
          style={{background:th.card,border:`1px solid ${vDragOver===fo.id?th.accent:th.border}`,borderRadius:9,padding:"10px 13px",display:"flex",alignItems:"center",gap:10,marginBottom:6,cursor:"grab",opacity:dragId===fo.id?0.4:1,outline:vDragOver===fo.id?`2px solid ${th.accent}`:"none"}}>
          <span style={{fontSize:20}}>📁</span>
          {renaming&&renaming.id===fo.id?(
            <div style={{flex:1,display:"flex",gap:7}} onClick={e=>e.stopPropagation()}>
              <VRenameInput currentName={fo.name} onSave={v=>setFolders(folders.map(x=>x.id===fo.id?{...x,name:v}:x))} onCancel={()=>setRenaming(null)} inp={inp} th={th} darkAccent={darkAccent}/>
            </div>
          ):(
            <>
              <div style={{flex:1,color:th.text,fontSize:13,fontWeight:500}}>{fo.name}</div>
              <span style={{color:th.sub,fontSize:10}}>{files.filter(f=>f.folderId===fo.id).length} best.</span>
              <button onClick={e=>{e.stopPropagation();setRenaming({id:fo.id});}} style={{background:"none",border:"none",color:th.sub,fontSize:12,padding:2}}>✏️</button>
              <button onClick={e=>{e.stopPropagation();deleteFolder(fo.id);}} style={{background:"none",border:"none",color:th.sub,fontSize:12,padding:2}}>🗑️</button>
            </>
          )}
        </div>
      ))}

      {/* Files */}
      {folderFiles.map(f=>(
        <div key={f.id}
          draggable onDragStart={e=>onDragStart(e,f.id,"file")} onDragEnd={onDragEnd}
          onClick={()=>{setVFile(f.id);setRenaming(null);}}
          style={{background:th.card,border:`1px solid ${th.border}`,borderRadius:9,padding:"10px 13px",display:"flex",alignItems:"center",gap:10,marginBottom:6,cursor:"grab",opacity:dragId===f.id?0.4:1}}>
          {f.photo
            ? <img src={f.photo} style={{width:38,height:38,borderRadius:6,objectFit:"cover",flexShrink:0,filter:"grayscale(1)"}}/>
            : <span style={{fontSize:18}}>📄</span>}
          {renaming&&renaming.id===f.id?(
            <div style={{flex:1,display:"flex",gap:7}} onClick={e=>e.stopPropagation()}>
              <VRenameInput currentName={f.name} onSave={v=>updateFile(f.id,{name:v})} onCancel={()=>setRenaming(null)} inp={inp} th={th} darkAccent={darkAccent}/>
            </div>
          ):(
            <>
              <div style={{flex:1,color:th.text,fontSize:13}}>{f.name}</div>
              <span style={{color:th.sub,fontSize:10}}>{f.photo?"📷 foto":`${f.content.length} tekens`}</span>
              <button onClick={e=>{e.stopPropagation();setRenaming({id:f.id});}} style={{background:"none",border:"none",color:th.sub,fontSize:12,padding:2}}>✏️</button>
              <button onClick={e=>{e.stopPropagation();setFiles(files.filter(x=>x.id!==f.id));}} style={{background:"none",border:"none",color:th.sub,fontSize:12,padding:2}}>🗑️</button>
            </>
          )}
        </div>
      ))}

      {subFolders.length===0&&folderFiles.length===0&&<div style={{color:th.muted,textAlign:"center",padding:"22px 0",fontSize:13}}>Nog leeg — maak een bestand of map aan</div>}

      {/* New file/folder inline input */}
      {vNewMode&&vNewMode.startsWith("tpl:")?(()=>{
        const tplIdx=parseInt(vNewMode.split(":")[1]);
        const tpl=FILE_TPLS[tplIdx];
        return<VNewInput label={tpl.name} placeholder={`Naam voor ${tpl.name}…`} onConfirm={name=>{const id=newFile(name,tpl.content);setVFile(id);setVNewMode(null);setVNewName("");}} onCancel={()=>{setVNewMode(null);setVNewName("");}} inp={inp} th={th} darkAccent={darkAccent}/>;
      })():null}
      {vNewMode==="file"&&<VNewInput label="bestand" placeholder="Naam van het bestand…" onConfirm={name=>{const id=newFile(name);setVFile(id);setVNewMode(null);}} onCancel={()=>setVNewMode(null)} inp={inp} th={th} darkAccent={darkAccent}/>}
      {vNewMode==="folder"&&<VNewInput label="map" placeholder="Naam van de map…" onConfirm={name=>{newFolder(name);setVNewMode(null);}} onCancel={()=>setVNewMode(null)} inp={inp} th={th} darkAccent={darkAccent}/>}

      {/* Action bar */}
      <div style={{display:"flex",gap:7,marginTop:10,flexWrap:"wrap"}}>
        <button onClick={()=>setVNewMode("folder")} style={{flex:1,minWidth:80,padding:9,background:th.card,border:`1px solid ${th.border}`,borderRadius:8,color:th.text,fontFamily:"inherit",fontSize:12}}>📁 Nieuwe map</button>
        <button onClick={()=>setVNewMode("file")} style={{flex:1,minWidth:80,padding:9,background:th.card,border:`1px solid ${th.border}`,borderRadius:8,color:th.text,fontFamily:"inherit",fontSize:12}}>📄 Nieuw bestand</button>
        <button onClick={()=>photoRef.current.click()} style={{flex:1,minWidth:80,padding:9,background:th.card,border:`1px solid ${th.border}`,borderRadius:8,color:th.text,fontFamily:"inherit",fontSize:12}}>📷 Foto uploaden</button>
        <input ref={photoRef} type="file" accept="image/*" multiple onChange={e=>{Array.from(e.target.files).forEach(f=>addPhoto(f));e.target.value="";}} style={{display:"none"}}/>
      </div>

      {/* Snelle sjablonen */}
      <div style={{marginTop:9,display:"flex",gap:6,flexWrap:"wrap"}}>
        {FILE_TPLS.map((tpl,i)=>(
          <button key={i} onClick={()=>handleTplClick(tpl)} style={{padding:"7px 12px",background:th.badge,border:`1px solid ${th.border}`,borderRadius:8,color:th.sub,fontFamily:"inherit",fontSize:12,display:"flex",alignItems:"center",gap:5}}>
            <span>{tpl.icon}</span><span>{tpl.name}</span>
          </button>
        ))}
      </div>

      {dragId&&<div style={{marginTop:12,padding:"8px 12px",background:th.accent+"18",border:`1px dashed ${th.accent}`,borderRadius:8,color:th.accent,fontSize:11,textAlign:"center"}}>🖐 Sleep naar een map om te verplaatsen · Sleep naar "Root" voor de hoofdmap</div>}
    </div>
  );
}

  function saveSyncCode(v){setSyncCodeR(v);sv("syncCode",v);}

  /* ─── Live clock ─── */
  useEffect(()=>{
    const t=setInterval(()=>setNow(new Date()),1000);
    return()=>clearInterval(t);
  },[]);

  /* ─── Weather via Open-Meteo (free, no key) ─── */
  async function fetchWeather(city){
    setWeatherLoad(true);
    try{
      const geo=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=nl&format=json`);
      const gj=await geo.json();
      if(!gj.results||!gj.results[0])throw new Error("Stad niet gevonden");
      const{latitude:lat,longitude:lon,name}=gj.results[0];
      const wx=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weathercode,windspeed_10m&timezone=auto`);
      const wj=await wx.json();
      const cur=wj.current;
      const code=cur.weathercode;
      let icon="🌤",desc="Gedeeltelijk bewolkt";
      if(code===0){icon="☀️";desc="Helder";}
      else if(code<=3){icon="⛅";desc="Bewolkt";}
      else if(code<=48){icon="🌫️";desc="Mist";}
      else if(code<=57){icon="🌦️";desc="Motregen";}
      else if(code<=67){icon="🌧️";desc="Regen";}
      else if(code<=77){icon="❄️";desc="Sneeuw";}
      else if(code<=82){icon="🌧️";desc="Regenbuien";}
      else if(code<=99){icon="⛈️";desc="Onweer";}
      setWeather({icon,desc,temp:Math.round(cur.temperature_2m),wind:Math.round(cur.windspeed_10m),name});
    }catch(e){setWeather({error:e.message||"Fout"});}
    setWeatherLoad(false);
  }
  useEffect(()=>{fetchWeather(weatherCity);},[weatherCity]);

  /* ─── File helpers ─── */
  function setFiles(v){setFilesRaw(v);sv("vfiles",v);}
  function updateFile(id,patch){setFiles(files.map(f=>f.id===id?{...f,...patch}:f));}

  /* ─── Storage meter ─── */
  const storageBytes=useMemo(()=>getStorageUsed(),[files,folders,tasks,persons]);
  const storageMax=5*1024*1024;
  const storagePct=Math.min(100,(storageBytes/storageMax)*100);
  const storageColor=storagePct>80?"#ef5350":storagePct>60?"#ffca28":"#66bb6a";

  /* ─── Week helpers ─── */
  function getWeekRange(off=0){
    const n=new Date();n.setHours(0,0,0,0);
    const day=n.getDay(),mon=day===0?-6:1-day;
    const s=new Date(n);s.setDate(n.getDate()+mon+off*7);
    const e=new Date(s);e.setDate(s.getDate()+6);
    return{s,e};
  }
  function inWeek(ds,off){
    if(!ds)return false;
    const{s,e}=getWeekRange(off);
    const d=new Date(ds+"T00:00:00");
    return d>=s&&d<=e;
  }

  const filteredBase=tasks.filter(t=>{
    if(filter==="Vandaag")      return t.day===TODAY;
    if(filter==="Gedaan")       return t.done;
    if(filter==="Open")         return !t.done;
    if(filter==="Deze week")    return inWeek(t.day,0)||inWeek(t.deadline,0);
    if(filter==="Volgende week")return inWeek(t.day,1)||inWeek(t.deadline,1);
    return true;
  }).sort((a,b)=>{
    if(a.done!==b.done)return a.done?1:-1;
    return PRIORITIES.indexOf(b.priority)-PRIORITIES.indexOf(a.priority);
  });
  const filtered=filteredBase.filter(t=>!taakZoek||t.text.toLowerCase().includes(taakZoek.toLowerCase()));

  function addOrEdit(){
    if(!form.text.trim())return;
    if(editId!==null){setTasks(tasks.map(t=>t.id===editId?{...t,...form}:t));setEditId(null);}
    else setTasks([...tasks,{...form,id:Date.now(),done:false}]);

  }
  function startEdit(task){
    setForm({text:task.text,deadline:task.deadline||TODAY,time:task.time||"",endTime:task.endTime||"",priority:task.priority,day:task.day||TODAY,color:task.color||"",recur:task.recur||{type:"geen"},link:task.link||"",personIds:task.personIds||[]});
    setEditId(task.id);setShowForm(true);
  }
  function toggle(id,ev){
    const task=tasks.find(t=>t.id===id);
    const nowDone=!task.done;
    setTasks(tasks.map(t=>t.id===id?{...t,done:nowDone}:t));
    if(nowDone){
      const r=ev?.currentTarget?.getBoundingClientRect?.();
      if(r)confetti(r.x+r.width/2,r.y);
      showToast("🎉 Klaar!");
    }
  }

  function exportAll(){
    const blob=new Blob([JSON.stringify({version:VERSION,exported:new Date().toISOString(),tasks,persons,files,folders,templates},null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`mijndag-${TODAY}.json`;a.click();URL.revokeObjectURL(url);
    showToast("✅ Geëxporteerd!");
  }
  function importAll(e){
    const file=e.target.files[0];if(!file)return;
    const r=new FileReader();
    r.onload=ev=>{try{
      const d=JSON.parse(ev.target.result);
      if(d.tasks)setTasks(d.tasks);
      if(d.persons)setPersons(d.persons);
      if(d.files)setFiles(d.files);
      if(d.folders)setFolders(d.folders);
      if(d.templates)setTemplates(d.templates);
      showToast("✅ Geladen!");
    }catch{showToast("❌ Ongeldig bestand");}};
    r.readAsText(file);e.target.value="";
  }

  async function syncUp(){
    if(!syncCode){showToast("❌ Voer een Bin ID in");return;}
    setSyncSt("Uploaden…");
    try{
      const res=await fetch(`https://api.jsonbin.io/v3/b/${syncCode}`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({tasks,persons,files,folders,templates})});
      setSyncSt(res.ok?"✅ Geüpload!":"❌ Mislukt");
    }catch{setSyncSt("❌ Geen verbinding");}
    setTimeout(()=>setSyncSt(""),3000);
  }
  async function syncDown(){
    if(!syncCode){showToast("❌ Voer een Bin ID in");return;}
    setSyncSt("Downloaden…");
    try{
      const res=await fetch(`https://api.jsonbin.io/v3/b/${syncCode}/latest`);
      const j=await res.json();const d=j.record;
      if(d.tasks)setTasks(d.tasks);if(d.persons)setPersons(d.persons);
      if(d.files)setFiles(d.files);if(d.folders)setFolders(d.folders);
      if(d.templates)setTemplates(d.templates);
      setSyncSt("✅ Gedownload!");
    }catch{setSyncSt("❌ Geen verbinding");}
    setTimeout(()=>setSyncSt(""),3000);
  }

  /* ─── Calendar ─── */
  const calDays=useMemo(()=>{
    const y=calMonth.getFullYear(),m=calMonth.getMonth();
    const first=new Date(y,m,1).getDay();
    const dim=new Date(y,m+1,0).getDate();
    const off=(first+6)%7;
    const cells=[];
    for(let i=0;i<off;i++)cells.push(null);
    for(let d=1;d<=dim;d++)cells.push(d);
    return{cells,y,m};
  },[calMonth]);

  function dayStr(d){const{y,m}=calDays;return`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;}
  function tasksForDay(d){if(!d)return[];const ds=dayStr(d);return tasks.filter(t=>t.day===ds||t.deadline===ds);}

      <div style={{marginBottom:18}}>

      </div>
    );

  /* ─── Verkenner helpers ─── */
  function currentFolderFiles(){return files.filter(f=>(f.folderId||null)===(vFolder||null));}
  function currentSubFolders(){return folders.filter(fo=>(fo.parentId||null)===(vFolder||null));}
  function breadcrumb(){
    const crumbs=[];
    let cur=vFolder;
    while(cur){
      const fo=folders.find(f=>f.id===cur);
      if(!fo)break;
      crumbs.unshift(fo);
      cur=fo.parentId||null;
    }
    return crumbs;
  }
  function newFile(name,content="",fid=null){
    const id=Date.now();
    setFiles([...files,{id,name:name||"Nieuw bestand",content:content||"",folderId:fid||vFolder||null}]);
    return id;
  }
  function newFolder(name){
    setFolders([...folders,{id:Date.now(),name:name||"Nieuwe map",parentId:vFolder||null}]);
  }
  function deleteFolder(id){
    const toDelete=new Set([id]);
    let changed=true;
    while(changed){changed=false;folders.forEach(f=>{if(f.parentId&&toDelete.has(f.parentId)&&!toDelete.has(f.id)){toDelete.add(f.id);changed=true;}});}
    setFiles(files.filter(f=>!toDelete.has(f.folderId)));
    setFolders(folders.filter(f=>!toDelete.has(f.id)));
  }

  function addPhoto(file){
    const reader=new FileReader();
    reader.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        const MAX=480;
        const scale=Math.min(1,MAX/Math.max(img.width,img.height));
        const w=Math.round(img.width*scale);
        const h=Math.round(img.height*scale);
        const canvas=document.createElement("canvas");
        canvas.width=w;canvas.height=h;
        const ctx=canvas.getContext("2d");
        ctx.filter="grayscale(1)";
        ctx.drawImage(img,0,0,w,h);
        const dataUrl=canvas.toDataURL("image/jpeg",0.82);
        const name=file.name.replace(/\.[^.]+$/,"")||"Foto";
        setFiles(prev=>[...prev,{id:Date.now(),name,content:"",photo:dataUrl,folderId:vFolder||null}]);
        showToast("📷 Foto opgeslagen!");
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  }

          {/* ══ LIVE APP-DATA PANEEL ══ */}
          {(()=>{
            function takenTxt(){
              const open=tasks.filter(t=>!t.done);
              const gedaan=tasks.filter(t=>t.done);
              let s=`MIJN TAKEN — ${new Date().toLocaleDateString("nl-NL")}\n${"=".repeat(40)}\n\n`;
              s+=`OPEN (${open.length})\n${"-".repeat(20)}\n`;
              open.forEach(t=>{
                s+=`□ ${t.text}`;
                if(t.priority!=="Normaal")s+=` [${t.priority}]`;
                if(t.deadline)s+=` · deadline: ${t.deadline}`;
                if(t.time)s+=` · ${t.time}${t.endTime?"–"+t.endTime:""}`;
                if(t.recur&&t.recur.type!=="geen")s+=` · 🔁 ${t.recur.type}`;
                s+="\n";
              });
              s+=`\nGEDAANDE TAKEN (${gedaan.length})\n${"-".repeat(20)}\n`;
              gedaan.forEach(t=>{s+=`✓ ${t.text}\n`;});
              return s;
            }

            function personenTxt(){
              let s=`CONTACTEN — ${new Date().toLocaleDateString("nl-NL")}\n${"=".repeat(40)}\n\n`;
              if(persons.length===0){s+="Geen personen opgeslagen.\n";return s;}
              persons.forEach(p=>{
                s+=`${p.emoji} ${p.name}\n`;
                if(p.phone)s+=`   📞 ${p.phone}\n`;
                if(p.email)s+=`   ✉️  ${p.email}\n`;
                if(p.place)s+=`   📍 ${p.place}\n`;
                s+="\n";
              });
              return s;
            }

            function sjablonenTxt(){
              let s=`SJABLONEN — ${new Date().toLocaleDateString("nl-NL")}\n${"=".repeat(40)}\n\n`;
              templates.forEach(tpl=>{s+=`${tpl.emoji} ${tpl.text} [${tpl.priority}]\n`;});
              return s;
            }

            function kalenderTxt(){
              const nu=new Date();
              const aankomend=tasks.filter(t=>t.day&&t.day>=TODAY&&!t.done).sort((a,b)=>a.day.localeCompare(b.day));
              let s=`KALENDER — ${nu.toLocaleDateString("nl-NL")}\n${"=".repeat(40)}\n\nAANKOMENDE TAKEN\n${"-".repeat(20)}\n`;
              if(aankomend.length===0){s+="Geen aankomende taken.\n";}
              aankomend.forEach(t=>{
                const d=new Date(t.day+"T00:00:00");
                s+=`${d.toLocaleDateString("nl-NL",{weekday:"short",day:"numeric",month:"short"})} — ${t.text}`;
                if(t.time)s+=` (${t.time}${t.endTime?"–"+t.endTime:""})`;
                s+="\n";
              });
              return s;
            }

            const LIVE_ITEMS=[
              {key:"taken",    icon:"✅",label:"Taken",    count:tasks.length,    sub:`${tasks.filter(t=>!t.done).length} open`,    txt:takenTxt},
              {key:"personen", icon:"👥",label:"Personen", count:persons.length,  sub:`${persons.length} contacten`,                 txt:personenTxt},
              {key:"sjablonen",icon:"⚡",label:"Sjablonen",count:templates.length,sub:`${templates.length} sjablonen`,               txt:sjablonenTxt},
              {key:"kalender", icon:"📅",label:"Kalender", count:tasks.filter(t=>t.day>=TODAY&&!t.done).length, sub:"aankomend",    txt:kalenderTxt},
            ];

            function dlTxt(label,txt){
              const blob=new Blob([txt()],{type:"text/plain"});
              const url=URL.createObjectURL(blob);
              const a=document.createElement("a");
              a.href=url;a.download=`${label.toLowerCase()}-${TODAY}.txt`;a.click();
              URL.revokeObjectURL(url);
            }

            return(
              <div style={{marginBottom:14}}>
                <div style={{color:th.accent,fontSize:9,letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>📊 APP-GEGEVENS</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginBottom:openLive?10:0}}>
                  {LIVE_ITEMS.map(item=>(
                    <button key={item.key} onClick={()=>setOpenLive(openLive===item.key?null:item.key)}
                      style={{background:openLive===item.key?th.accent+"22":th.card,border:`1.5px solid ${openLive===item.key?th.accent:th.border}`,borderRadius:10,padding:"10px 12px",textAlign:"left",fontFamily:"inherit",cursor:"pointer",display:"flex",alignItems:"center",gap:9}}>
                      <span style={{fontSize:18,flexShrink:0}}>{item.icon}</span>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{color:openLive===item.key?th.accent:th.text,fontSize:12,fontWeight:600}}>{item.label}</div>
                        <div style={{color:th.sub,fontSize:10}}>{item.sub}</div>
                      </div>
                      <div style={{color:openLive===item.key?th.accent:th.muted,fontSize:9,transform:openLive===item.key?"rotate(180deg)":"none",transition:"transform .2s"}}>▾</div>
                    </button>
                  ))}
                </div>
                {openLive&&(()=>{
                  const item=LIVE_ITEMS.find(x=>x.key===openLive);
                  if(!item)return null;
                  const txt=item.txt();
                  return(
                    <div style={{background:th.card,border:`1.5px solid ${th.accent}`,borderRadius:10,overflow:"hidden"}}>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 12px",borderBottom:`1px solid ${th.border}`}}>
                        <div style={{color:th.accent,fontSize:11,fontWeight:600}}>{item.icon} {item.label}</div>
                        <div style={{display:"flex",gap:7,alignItems:"center"}}>
                          <button onClick={()=>dlTxt(item.label,item.txt)} style={{background:th.accent,border:"none",borderRadius:7,color:darkAccent,padding:"4px 10px",fontSize:11,fontFamily:"inherit",fontWeight:600}}>↓ .txt</button>
                          <button onClick={()=>setOpenLive(null)} style={{background:"none",border:"none",color:th.sub,fontSize:13,padding:2}}>✕</button>
                        </div>
                      </div>
                      <pre style={{padding:"12px 14px",color:th.sub,fontSize:11,lineHeight:1.7,whiteSpace:"pre-wrap",wordBreak:"break-word",maxHeight:260,overflowY:"auto",fontFamily:"'SF Mono',monospace,-apple-system",background:"transparent"}}>{txt}</pre>
                    </div>
                  );
                })()}
                <div style={{height:1,background:th.border,marginTop:14,marginBottom:14}}/>
              </div>
            );
          })()}

          {/* Storage meter */}
          <div style={{background:th.card,border:`1px solid ${th.border}`,borderRadius:10,padding:"10px 14px",marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <span style={{color:th.sub,fontSize:11}}>💾 Opslag gebruikt</span>
              <span style={{color:storageColor,fontSize:11,fontWeight:600}}>{(storageBytes/1024).toFixed(1)} KB / 5 120 KB ({storagePct.toFixed(1)}%)</span>
            </div>
            <div style={{height:7,background:th.muted,borderRadius:4,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${storagePct}%`,background:storageColor,borderRadius:4,transition:"width .5s"}}/>
            </div>
          </div>

          {/* File open view */}
          {vFile!==null?(()=>{
            const f=files.find(x=>x.id===vFile);
            if(!f){setVFile(null);return null;}
            if(f.photo) return(
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <button onClick={()=>{setVFile(null);setRenaming(null);}} style={{background:th.badge,border:`1px solid ${th.border}`,borderRadius:7,color:th.accent,padding:"5px 11px",fontSize:12,fontFamily:"inherit",flexShrink:0}}>← Terug</button>
                  <div style={{color:th.text,fontSize:14,fontWeight:600,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.name}</div>
                  <a href={f.photo} download={f.name+".jpg"} style={{background:"none",border:"none",color:th.accent,fontSize:13,padding:3,textDecoration:"none",flexShrink:0}}>↓</a>
                  <button onClick={()=>{setFiles(files.filter(x=>x.id!==vFile));setVFile(null);}} style={{background:"none",border:"none",color:th.sub,fontSize:13,padding:3,flexShrink:0}}>🗑️</button>
                </div>
                <div style={{background:th.card,border:`1px solid ${th.border}`,borderRadius:11,overflow:"hidden",textAlign:"center",padding:4}}>
                  <img src={f.photo} style={{maxWidth:"100%",borderRadius:8,display:"block",filter:"grayscale(1)"}}/>
                </div>
                <div style={{color:th.muted,fontSize:10,textAlign:"center"}}>📷 480p · zwart-wit</div>
              </div>
            );
            return(
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                  <button onClick={()=>{setVFile(null);setRenaming(null);}} style={{background:th.badge,border:`1px solid ${th.border}`,borderRadius:7,color:th.accent,padding:"5px 11px",fontSize:12,fontFamily:"inherit",flexShrink:0}}>← Terug</button>
                  {renaming&&renaming.id===vFile?(
                    <VRenameInput currentName={f.name} onSave={v=>updateFile(vFile,{name:v})} onCancel={()=>setRenaming(null)} inp={inp} th={th} darkAccent={darkAccent}/>
                  ):(
                    <>
                      <div style={{color:th.text,fontSize:14,fontWeight:600,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",minWidth:0}}>{f.name}</div>
                      <button onClick={()=>setRenaming({id:vFile})} style={{background:"none",border:"none",color:th.sub,fontSize:13,padding:3,flexShrink:0}} title="Hernoemen">✏️</button>
                    </>
                  )}
                  <button onClick={()=>{const blob=new Blob([f.content],{type:"text/plain"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=f.name.includes(".")?f.name:f.name+".txt";a.click();URL.revokeObjectURL(url);}} style={{background:"none",border:"none",color:th.accent,fontSize:13,padding:3,flexShrink:0}} title="Downloaden">↓</button>
                </div>
                <textarea value={f.content} onChange={e=>updateFile(vFile,{content:e.target.value})} style={{...inp,minHeight:400,padding:14,fontSize:13,lineHeight:1.78,borderRadius:11}} placeholder="Begin met typen…"/>
                <div style={{color:th.muted,fontSize:10,textAlign:"right"}}>{f.content.length} tekens · automatisch opgeslagen</div>
              </div>
            );
          })():(
            /* Folder view */
            <VFolderView
              files={files} folders={folders} vFolder={vFolder} setVFolder={setVFolder}
              setVFile={setVFile} setRenaming={setRenaming} renaming={renaming}
              setFiles={setFiles} setFolders={setFolders}
              newFile={newFile} newFolder={newFolder} deleteFolder={deleteFolder}
              th={th} inp={inp} darkAccent={darkAccent}
              breadcrumb={breadcrumb} currentFolderFiles={currentFolderFiles} currentSubFolders={currentSubFolders}
              vNewName={vNewName} setVNewName={setVNewName} vNewMode={vNewMode} setVNewMode={setVNewMode} addPhoto={addPhoto}
              vDragOver={vDragOver} setVDragOver={setVDragOver}
              updateFile={updateFile}
            />
          )}
        </>}

        {tab==="sjablonen"&&<>
          {PageHeader({label:"Sjablonen",title:"Standaard taken"})}

          <div style={{position:"relative",marginBottom:12}}>

                <button onClick={()=>setTasks([...tasks,{...EMPTY_FORM,id:Date.now(),text:tpl.text,priority:tpl.priority,color:tpl.color,done:false}])} style={{background:tpl.color,border:"none",borderRadius:7,color:"#fff",padding:"5px 9px",fontSize:11,fontFamily:"inherit",fontWeight:600}}>+ Voeg toe</button>
                <button onClick={()=>{setEditTpl(tpl.id);setTplForm({text:tpl.text,priority:tpl.priority,color:tpl.color,emoji:tpl.emoji});setShowTplF(true);}} style={{background:th.badge,border:`1px solid ${th.border}`,borderRadius:7,color:th.sub,padding:"5px 7px",fontSize:11,fontFamily:"inherit"}}>✏️</button>
                <button onClick={()=>setTemplates(templates.filter(t=>t.id!==tpl.id))} style={{background:th.badge,border:`1px solid ${th.border}`,borderRadius:7,color:th.sub,padding:"5px 7px",fontSize:11,fontFamily:"inherit"}}>🗑️</button>
              </div>

          </div>

          {showTplF&&(

              <div style={{color:th.accent,fontSize:10,letterSpacing:2,textTransform:"uppercase"}}>{editTpl?"Bewerken":"Nieuw sjabloon"}</div>
              <div style={{display:"flex",gap:8}}><input value={tplForm.emoji} onChange={e=>setTplForm({...tplForm,emoji:e.target.value})} style={{...inp,width:52,textAlign:"center",fontSize:20}} maxLength={2}/><input value={tplForm.text} onChange={e=>setTplForm({...tplForm,text:e.target.value})} placeholder="Naam" style={{...inp,flex:1}}/></div>
              <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>{PRIORITIES.map(p=>{const c=PRIO_COLORS[p];return<button key={p} onClick={()=>setTplForm({...tplForm,priority:p})} style={{flex:1,minWidth:50,padding:"6px 0",borderRadius:8,border:`1px solid ${tplForm.priority===p?c:th.border}`,background:tplForm.priority===p?c+"22":"transparent",color:tplForm.priority===p?c:th.sub,fontFamily:"inherit",fontSize:10,fontWeight:tplForm.priority===p?700:400}}>{p}</button>;})}
              </div>

              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>{if(!tplForm.text.trim())return;if(editTpl!==null)setTemplates(templates.map(t=>t.id===editTpl?{...t,...tplForm}:t));else setTemplates([...templates,{id:Date.now(),...tplForm}]);setShowTplF(false);setEditTpl(null);}} style={{flex:1,padding:10,background:th.accent,border:"none",borderRadius:8,color:darkAccent,fontWeight:700,fontSize:13,fontFamily:"inherit"}}>{editTpl?"Opslaan":"Toevoegen"}</button>
                <button onClick={()=>{setShowTplF(false);setEditTpl(null);}} style={{padding:"10px 13px",background:th.badge,border:`1px solid ${th.border}`,borderRadius:8,color:th.sub,fontSize:13,fontFamily:"inherit"}}>Annuleer</button>
              </div>
            </div>

                  <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:6}}>
                    <div style={{color:th.accent,fontSize:12,fontWeight:700}}>{entry.version}</div>
                    {entry.date&&<div style={{color:th.muted,fontSize:10}}>{entry.date}</div>}
                  </div>
                  {entry.items.map((item,i)=>(
                    <div key={i} style={{display:"flex",gap:7,marginBottom:4,alignItems:"flex-start"}}>
                      <span style={{flexShrink:0,fontSize:9,fontWeight:700,borderRadius:4,padding:"1px 5px",marginTop:1,background:item.type==="bug"?"#ef535022":"#66bb6a22",color:item.type==="bug"?"#ef5350":"#66bb6a"}}>
                        {item.type==="bug"?"🐛 FIX":"✨ NIEUW"}
                      </span>
                      <span style={{color:th.sub,fontSize:11,lineHeight:1.5}}>{item.text}</span>
                    </div>
                  ))}
                </div>
              ))}
            </div>}
          </div>
        </>}

        {/* ══════════════ HELP ══════════════ */}
        {tab==="help"&&<>
          {PageHeader({label:"Help",title:"Uitleg"})}
          {(()=>{
            const HELP_ITEMS = [
              {t:"🏠 Startpagina",b:[
                "De startpagina is het eerste scherm dat je ziet als je de app opent.",
                "Bovenaan zie je de huidige tijd en datum.",
                "Daaronder vind je een snel overzicht van je taken van vandaag — zodat je meteen weet wat je nog moet doen.",
                "Je ziet ook je favoriete contacten. Je kunt iemand als favoriet instellen via het tabblad 👥 Personen.",
                "Rechts bovenaan bij elk onderdeel staat een knop om naar het volledige scherm te gaan.",
              ]},
              {t:"✅ Taken — iets toevoegen aan je daglijst",b:[
                "Taken zijn dingen die je wilt of moet doen, zoals 'boodschappen halen' of 'dokter bellen'.",
                "Tik op de knop '+ Nieuwe taak' onderaan het scherm om een nieuwe taak aan te maken.",
                "Je kunt een naam invullen, een dag kiezen waarop je het wilt doen, en een deadline instellen (de uiterste datum).",
                "Je kunt ook een begintijd en eindtijd invullen, handig voor afspraken zoals 'tandarts 10:00 – 11:00'.",
                "Bij prioriteit kies je hoe belangrijk de taak is: Laag, Normaal, Hoog of Urgent. Urgente taken kleuren rood en knipperen zodat je ze niet kunt missen.",
                "Als je een Hoge of Urgente taak afvinkt, vliegt er confetti over je scherm — een kleine beloning! 🎉",
                "Je kunt ook een link toevoegen, bijvoorbeeld naar een website of YouTube-video die bij de taak hoort.",
                "Een taak afvinken doe je door op het ronde bolletje links van de taaknaam te tikken.",
              ]},
              {t:"🔁 Herhaling — terugkerende taken",b:[
                "Sommige dingen doe je elke dag of elke week opnieuw, zoals medicijnen innemen of de vuilnis buitenzetten.",
                "Bij het aanmaken van een taak kun je bij 'Herhaling' aangeven hoe vaak de taak terugkomt.",
                "Kies uit: Geen, Dagelijks, Wekelijks, Om de week, Maandelijks of Jaarlijks.",
                "Bij 'Wekelijks' kun je ook kiezen op welke dag van de week (bijv. elke maandag).",
                "Bij 'Maandelijks' kies je op welke datum van de maand (bijv. elke 1e van de maand).",
                "De taak verschijnt dan automatisch op de juiste dagen in je lijst.",
              ]},
              {t:"📅 Kalender — alles op een rijtje per dag",b:[
                "De kalender laat een heel maand zien, net als een gewone kalender aan de muur.",
                "Op dagen waarop je taken hebt, zie je kleine gekleurde bolletjes. De kleur geeft de prioriteit aan.",
                "Tik op een dag om te zien welke taken er op die dag staan.",
                "Er verschijnt dan een venster met de taken van die dag. Tik op het kruisje ✕ rechtsboven om dit venster weer te sluiten.",
                "Met de pijltjes ‹ en › kun je naar de vorige of volgende maand bladeren.",
              ]},
              {t:"👥 Personen — contacten bewaren",b:[
                "Bij Personen kun je mensen opslaan die belangrijk voor je zijn, zoals familieleden of de huisarts.",
                "Tik op '+ Persoon toevoegen' om iemand toe te voegen. Je kunt een naam, telefoonnummer, e-mailadres en woonplaats invullen.",
                "Je kunt ook een emoji kiezen die bij de persoon past, zoals 👨‍⚕️ voor de dokter of 👵 voor oma.",
                "Als je een taak aanmaakt, kun je bij 'Met wie' aangeven wie erbij is. Zo zie je direct op de taak met wie de afspraak is.",
                "Markeer iemand als ⭐ favoriet om ze op de startpagina te zien.",
              ]},
              {t:"📁 Verkenner — bestanden en notities",b:[
                "De Verkenner werkt een beetje zoals de map op je computer of telefoon.",
                "Je kunt hier tekstbestanden aanmaken om notities in bij te houden, zoals een boodschappenlijstje of een wachtwoord.",
                "Tik op '📄 Nieuw bestand' om een leeg bestand te maken. Geef het een naam en begin met typen.",
                "Je kunt ook mappen aanmaken om je bestanden netjes te ordenen. Tik op '📁 Nieuwe map'.",
                "Er zijn ook kant-en-klare sjablonen: een Kladblok (leeg), een Locatie-kaartje, een Wachtwoord-notitie en een Boodschappenlijst.",
                "Bovenaan de Verkenner zie je een gekleurde balk die aangeeft hoeveel opslagruimte je al gebruikt. De app heeft 5 MB beschikbaar.",
                "Je kunt een bestand ook downloaden als tekstbestand op je telefoon via de ↓ knop.",
              ]},
              {t:"⚡ Sjablonen — snel een vaste taak toevoegen",b:[
                "Sjablonen zijn voorgemaakte taken die je steeds opnieuw kunt gebruiken.",
                "Stel je hebt elke week 'Boodschappen doen' op je lijst — dan maak je daar een sjabloon van.",
                "Ga naar het tabblad Sjablonen en tik op '+ Nieuw sjabloon'. Vul de naam in en kies een kleur en prioriteit.",
                "Als je daarna een nieuwe taak aanmaakt, zie je bovenaan je sjablonen staan. Tik erop om de naam en instellingen automatisch in te vullen.",
                "Je kunt ook direct vanuit het sjablonenlijst een taak toevoegen met de '+ Voeg toe' knop.",
              ]},
              {t:"☁️ Synchroniseren — op meerdere apparaten",b:[
                "Normaal worden je taken alleen opgeslagen op het apparaat waarmee je de app gebruikt.",
                "Wil je je taken ook op een ander apparaat (bijv. je tablet of een ander telefoon) zien? Dan kun je synchroniseren.",
                "Maak een gratis account aan op de website jsonbin.io (dit is een gratis opslagdienst op het internet).",
                "Maak daar een zogenaamde 'Bin' aan — dat is een plekje op het internet waar je gegevens worden bewaard.",
                "Kopieer het Bin ID (een reeks letters en cijfers) en plak dit in de app bij Instellingen → Synchroniseren.",
                "Tik op '↑ Upload' om je gegevens op te slaan. Tik op '↓ Download' op een ander apparaat om ze op te halen.",
              ]},
              {t:"💾 Export & Import — een reservekopie maken",b:[
                "Met Export kun je al je gegevens opslaan als een bestand op je telefoon. Dit is een soort reservekopie.",
                "Ga naar Instellingen en tik op '↑ Exporteer alles'. Er wordt een bestand opgeslagen op je telefoon.",
                "Wil je die gegevens later terugzetten, of op een ander apparaat laden? Tik dan op '↓ Importeer' en kies het bestand.",
                "Het is slim om af en toe een exportje te maken, zodat je nooit iets kwijtraakt.",
              ]},
              {t:"🎨 Thema — de kleur van de app aanpassen",b:[
                "Je kunt de uitstraling van de app aanpassen naar jouw smaak.",
                "Ga naar Instellingen en kijk bij 'Thema'.",
                "Er zijn 6 thema's: Donker (donkergrijs), Licht (wit), Oranje, Mint (groen), Blauw en Roze.",
                "Tik op een thema om het meteen toe te passen. De app past direct van kleur!",
              ]},
            ];
            return HELP_ITEMS.map((s,i)=>(
              <div key={i} style={{background:th.card,border:`1px solid ${openHelp===i?th.accent:th.border}`,borderRadius:11,marginBottom:8,overflow:"hidden"}}>
                <button onClick={()=>setOpenHelp(openHelp===i?null:i)} style={{width:"100%",background:"none",border:"none",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"13px 14px",fontFamily:"inherit",cursor:"pointer",gap:10}}>
                  <div style={{color:openHelp===i?th.accent:th.text,fontSize:13,fontWeight:600,textAlign:"left"}}>{s.t}</div>
                  <div style={{color:th.sub,fontSize:14,flexShrink:0,transform:openHelp===i?"rotate(180deg)":"none",transition:"transform .2s"}}>▾</div>
                </button>
                {openHelp===i&&(
                  <div style={{padding:"0 14px 14px",display:"flex",flexDirection:"column",gap:7}}>
                    {s.b.map((regel,j)=>(
                      <div key={j} style={{display:"flex",gap:9,alignItems:"flex-start"}}>
                        <span style={{color:th.accent,fontSize:12,marginTop:1,flexShrink:0}}>·</span>
                        <span style={{color:th.sub,fontSize:12,lineHeight:1.75}}>{regel}</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            ));
          })()}
        </>}

      </div>

      {/* ══════════════ BOTTOM NAV ══════════════ */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:th.navBg,borderTop:`1px solid ${th.border}`,zIndex:100,backdropFilter:"blur(16px)"}}>
        <div style={{display:"flex",overflowX:"auto",scrollbarWidth:"none",WebkitOverflowScrolling:"touch",padding:"6px 4px 12px",gap:0,justifyContent:"space-around",minWidth:"100%"}}>
          <style>{`.navscroll::-webkit-scrollbar{display:none;}`}</style>
          {TABS.map(item=>(
            <button key={item.key} onClick={()=>setTab(item.key)} style={{background:"none",border:"none",display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"3px 10px",borderRadius:9,fontFamily:"inherit",flexShrink:0,minWidth:56}}>
              <div style={{fontSize:18,lineHeight:1}}>{item.icon}</div>
              <div style={{fontSize:9,color:tab===item.key?th.accent:th.sub,fontWeight:tab===item.key?700:400,letterSpacing:.2,whiteSpace:"nowrap"}}>{item.label}</div>
              {tab===item.key&&<div style={{width:3,height:3,borderRadius:"50%",background:th.accent}}/>}
            </button>
          ))}
        </div>
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
